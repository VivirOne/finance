<style>

/* PIN Screen */
.pin-wrap {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 80vh; gap: 20px; text-align: center;

@keyframes shake {

@media (max-width: 600px) {

  .form-row { flex-direction: column; gap: 0; }
  .prop-tax-grid { grid-template-columns: repeat(3, 1fr); }

  .stat-value { font-size: 18px; }

}
</style>

function fmt(n) {
  const a = Math.abs(n);
  return (n < 0 ? "-" : "") + "$" + a.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

let toastTimer;
function showToast(msg, undoFn) {
  clearTimeout(toastTimer);
  let el = $(".toast"); if (el) el.remove();
  el = document.createElement("div"); el.className = "toast";
  el.innerHTML = `<span>${msg}</span>`;
  if (undoFn) {
    const btn = document.createElement("button");
    btn.className = "toast-undo"; btn.textContent = "Undo";
    btn.onclick = () => { clearTimeout(toastTimer); el.remove(); undoFn(); };
    el.appendChild(btn);
  }
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), undoFn ? 5000 : 2400);
}

// SHA-256 hash
async function hashPin(pin) {
  const enc = new TextEncoder().encode(pin);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

let pinResolve = null;

function initFirebase() {
  if (firebaseConfig.apiKey === "YOUR_API_KEY") { app.innerHTML = '<div class="setup-wrap fade-in"><h1>John & Ira</h1><p>Firebase not configured.</p></div>'; return; }
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();

    // Check if already authenticated this session
    const sessionPin = sessionStorage.getItem('finance_pin');
    if (sessionPin) {
      authenticateAndLoad(sessionPin);
      return;
    }

    // Check if PIN has been set
    db.ref("pin").once("value").then(snap => {
      const pinHash = snap.val();
      if (!pinHash) {
        showPinScreen("set");
      } else {
        showPinScreen("enter", pinHash);
      }
    }).catch(e => {
      console.error("Error checking PIN:", e);
      showPinScreen("enter", null);
    });
  } catch(e) { console.error(e); }
}

async function authenticateAndLoad(pin) {
  try {
    await firebase.auth().signInAnonymously();
    sessionStorage.setItem('finance_pin', pin);

    db.ref(".info/connected").on("value", s => {
      connected = s.val() === true;
      const d = $(".status-dot");
      if (d) d.className = connected ? "status-dot" : "status-dot offline";
    });

    // Check if we need to migrate from old flat structure
    const oldSnap = await db.ref("tracker/bills").once("value");
    if (oldSnap.val()) {
      // Old format exists — migrate to 2026
      const oldTracker = (await db.ref("tracker").once("value")).val();
      const yearData = {
        bills: oldTracker.bills || DEFAULT_BILLS,
        expenses: oldTracker.expenses || {},
        deletedExpenses: oldTracker.deletedExpenses || {},
        carryForward: 0
      };
      await db.ref("tracker").remove();
      await db.ref("tracker/2026").set(yearData);
    }

    // Check if current year exists, if not create it from previous year
    const curSnap = await db.ref("tracker/" + CURRENT_YEAR).once("value");
    if (!curSnap.val()) {
      // Look for the most recent previous year
      const allYears = await db.ref("tracker").once("value");
      const yearKeys = Object.keys(allYears.val() || {}).filter(k => /^\d{4}$/.test(k)).map(Number).sort();

      if (yearKeys.length > 0) {
        const prevYear = yearKeys[yearKeys.length - 1];
        const prevData = allYears.val()[prevYear];

        // Calculate ending balance from previous year
        const prevBills = prevData.bills || DEFAULT_BILLS;
        const prevExpenses = prevData.expenses || {};
        let johnCr = 0, iraCr = 0;
        Object.values(prevExpenses).forEach(e => {
          const half = Math.abs(e.halfAmount);
          const person = e.paidBy || "John";
          if (e.halfAmount < 0) { if (person === "John") johnCr -= half; else iraCr -= half; }
          else { if (person === "John") johnCr += half; else iraCr += half; }
        });
        let endBal = -(johnCr - iraCr) + (prevData.carryForward || 0);
        for (let i = 0; i < 12; i++) {
          endBal += (prevBills.mortgage + prevBills.condoFees + prevBills.parking + (prevBills.propertyTax[i] || 0)) / 2;
        }

        // Create new year with carry forward and copied bills
        await db.ref("tracker/" + CURRENT_YEAR).set({
          bills: JSON.parse(JSON.stringify(prevBills)),
          expenses: {},
          deletedExpenses: {},
          carryForward: Math.round(endBal * 100) / 100
        });
      } else {
        // No previous year — seed with defaults
        await db.ref("tracker/" + CURRENT_YEAR).set({
          bills: JSON.parse(JSON.stringify(DEFAULT_BILLS)),
          expenses: DEFAULT_EXPENSES,
          deletedExpenses: {},
          carryForward: 0
        });
      }
    }

    // Load the viewed year
    loadYear(viewYear);
  } catch(e) {
    console.error("Auth failed:", e);
    sessionStorage.removeItem('finance_pin');
    showPinScreen("enter", null);
  }
}

function loadYear(year) {
  // Detach old listener
  if (yearListener) {
    db.ref("tracker/" + yearListener).off("value");
  }
  yearListener = year;
  viewYear = year;

  db.ref("tracker/" + year).on("value", snap => {
    const val = snap.val();
    if (val) {
      data = {
        bills: { ...DEFAULT_BILLS, ...(val.bills || {}) },
        expenses: val.expenses || {},
        deletedExpenses: val.deletedExpenses || {},
        carryForward: val.carryForward || 0
      };
    } else {
      data = { bills: JSON.parse(JSON.stringify(DEFAULT_BILLS)), expenses: {}, deletedExpenses: {}, carryForward: 0 };
    }
    // Auto-purge deleted items older than 30 days
    const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
    let purged = false;
    Object.entries(data.deletedExpenses || {}).forEach(([id, e]) => { if (e.deletedAt && e.deletedAt < cutoff) { delete data.deletedExpenses[id]; purged = true; } });
    if (purged) saveData();
    render();
  });
}

function switchYear(year) {
  viewYear = year;
  loadYear(year);
}

function showPinScreen(mode, storedHash) {
  const isSet = mode === "set";
  let pin = "";
  let firstPin = ""; // for confirm step during set
  let confirming = false;
  let errorMsg = "";

  function renderPinUI() {
    const title = isSet
      ? (confirming ? "Confirm your PIN" : "Set a PIN")
      : "Enter PIN";
    const subtitle = isSet
      ? (confirming ? "Enter the same PIN again to confirm." : "Choose a 4-digit PIN that you and Ira will use to access your tracker.")
      : "Enter your 4-digit PIN to continue.";

    app.innerHTML = `
      <div class="pin-wrap fade-in">
        <h1>${title}</h1>
        <p>${subtitle}</p>
        <div class="pin-dots">
          ${[0,1,2,3].map(i => `<div class="pin-dot ${i < pin.length ? 'filled' : ''} ${errorMsg ? 'error' : ''}"></div>`).join("")}
        </div>
        <div class="pin-error-msg">${errorMsg}</div>
        <div class="pin-keypad">
          ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="pin-key" data-key="${n}">${n}</button>`).join("")}
          <div class="pin-key empty"></div>
          <button class="pin-key" data-key="0">0</button>
          <button class="pin-key back" data-key="back">←</button>
        </div>
      </div>`;

    $$(".pin-key:not(.empty)").forEach(k => {
      k.onclick = () => {
        errorMsg = "";
        if (k.dataset.key === "back") {
          pin = pin.slice(0, -1);
          renderPinUI();
        } else if (pin.length < 4) {
          pin += k.dataset.key;
          renderPinUI();
          if (pin.length === 4) checkPin();
        }
      };
    });

    async function checkPin() {
      if (isSet && !confirming) {
        firstPin = pin;
        pin = "";
        confirming = true;
        errorMsg = "";
        setTimeout(() => renderPinUI(), 200);
      } else if (isSet && confirming) {
        if (pin === firstPin) {
          const hash = await hashPin(pin);
          await db.ref("pin").set(hash);
          authenticateAndLoad(pin);
        } else {
          errorMsg = "PINs don't match. Try again.";
          pin = "";
          confirming = false;
          firstPin = "";
          setTimeout(() => renderPinUI(), 200);
        }
      } else {
        const hash = await hashPin(pin);
        if (storedHash && hash === storedHash) {
          authenticateAndLoad(pin);
        } else {
          if (!storedHash) {
            try {
              const snap = await db.ref("pin").once("value");
              storedHash = snap.val();
              if (hash === storedHash) { authenticateAndLoad(pin); return; }
            } catch(e) {}
          }
          errorMsg = "Wrong PIN. Try again.";
          pin = "";
          setTimeout(() => renderPinUI(), 200);
        }
      }
    }
  }

  renderPinUI();
}

function saveData() { if (db && data) db.ref("tracker/" + viewYear).set(data); }

// ── CALCULATIONS ──
// Balance from John's perspective: positive = John owes Ira, negative = John has credit
// Ira pays all bills → John owes half each month
// John pays shared expense → Ira owes John half (credit for John)
// Ira pays shared expense → John owes Ira half (debit for John)

function getFullBill(i) { const b = data.bills; return b.mortgage + b.condoFees + b.parking + (b.propertyTax[i] || 0); }
function getHalfBill(i) { return getFullBill(i) / 2; }

function getExpensesList() { if (!data.expenses) return []; return Object.entries(data.expenses).map(([id, e]) => ({ id, ...e })).sort((a, b) => (b.date || '').localeCompare(a.date || '')); }

function getNetCredits() {
  let johnCredits = 0, iraCredits = 0;
  getExpensesList().forEach(e => {
    const half = Math.abs(e.halfAmount);
    const person = e.paidBy || "John";
    if (e.halfAmount < 0) { if (person === "John") johnCredits -= half; else iraCredits -= half; }
    else { if (person === "John") johnCredits += half; else iraCredits += half; }
  });
  return { johnCredits, iraCredits, net: johnCredits - iraCredits };
}

function computeBalances() {
  const { net } = getNetCredits();
  let running = (data.carryForward || 0) - net; // carry forward + net credits
  return MONTHS.map((name, i) => {
    const full = getFullBill(i), half = full / 2;
    running += half;
    return { month: name, short: SHORT[i], idx: i, fullBill: full, halfBill: half, running };
  });
}

// ── RENDER ──
function render() { if (!data) return; ({ dashboard: renderDashboard, add: renderAddExpense, expenses: renderExpenses, settings: renderSettings }[currentView] || renderDashboard)(); }

function renderNav() {
  return `<div class="header"><div><h1>John & Ira</h1>
    <div class="year-picker">
      <button data-yr="${viewYear - 1}" title="Previous year">‹</button>
      <span>${viewYear}</span>
      <button data-yr="${viewYear + 1}" title="Next year" ${viewYear >= CURRENT_YEAR ? 'disabled' : ''}>›</button>
    </div></div>
    <div class="header-right"><span class="${connected ? 'status-dot' : 'status-dot offline'}" title="${connected ? 'Connected to database' : 'Offline'}"></span>
    <div class="nav">${[["dashboard","Overview"],["add","Add Expense"],["expenses","Expenses"],["settings","Bills"]].map(([k,l]) =>
      `<button class="${currentView===k?'active':''}" data-view="${k}">${l}</button>`).join("")}</div></div></div>`;
}

function renderDashboard() {
  const bal = computeBalances(), now = new Date();
  const cm = now.getFullYear() === viewYear ? now.getMonth() : 11; // show Dec for past years
  const cur = bal[cm]?.running ?? 0;
  const { johnCredits, iraCredits } = getNetCredits();
  const covered = bal.reduce((last, b, i) => b.running <= 0 ? i : last, -1);
  const johnOwes = cur > 0;
  const billsYTD = bal.slice(0, cm + 1).reduce((s, b) => s + b.halfBill, 0);
  const maxAbs = Math.max(...bal.map(b => Math.abs(b.running)), 1);

  let label, amount, footer;
  if (johnOwes) {
    label = "JOHN OWES IRA"; amount = fmt(cur); footer = "John's expense credits have been used up.";
  } else {
    label = "JOHN IS COVERED"; amount = fmt(Math.abs(cur)) + " credit";
    footer = covered >= 11 ? "John won't have to pay all year!" : covered >= cm ? `John doesn't need to pay until ${MONTHS[covered + 1]}.` : "Credits running low.";
  }

  app.innerHTML = renderNav() + `<div class="fade-in">
    <div class="status-card ${johnOwes ? 'owing' : 'credit'}">
      <div class="status-top"><span class="status-label">${label}</span><span class="status-month">${MONTHS[cm]} ${viewYear}</span></div>
      <div class="status-amount">${amount}</div>
      <div class="status-footer">${footer}</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><span class="stat-label">John's Credits</span><span class="stat-value">${fmt(johnCredits)}</span><span class="stat-sub">From John's shared expenses</span></div>
      <div class="stat-card"><span class="stat-label">Ira's Credits</span><span class="stat-value">${fmt(iraCredits)}</span><span class="stat-sub">From Ira's shared expenses</span></div>
      <div class="stat-card"><span class="stat-label">John's Bills YTD</span><span class="stat-value">${fmt(billsYTD)}</span><span class="stat-sub">John's half through ${SHORT[cm]}</span></div>
    </div>
    <div class="section"><h2 class="section-title">Running Balance</h2>
      <div class="chart-wrap">${(() => {
        // Find crossover: first month where balance goes positive after being negative
        const crossIdx = bal.findIndex((b,i) => b.running > 0 && (i === 0 || bal[i-1].running <= 0));
        return bal.map((b,i) => {
          const pct = (Math.abs(b.running)/maxAbs)*100, cr = b.running<=0, cu = i===cm, fu = i>cm;
          const isCross = i === crossIdx && crossIdx > 0;
          return `<div class="chart-col ${fu?'future':''} ${isCross?'crossover':''}">
            ${isCross ? '<span class="crossover-label">PAY</span>' : ''}
            <div class="chart-bar-wrap">${cr ?
            `<div style="flex:1"></div><div class="chart-bar credit ${cu?'current':''}" style="height:${Math.max(pct*0.5,3)}%"></div>` :
            `<div class="chart-bar owing ${cu?'current':''}" style="height:${Math.max(pct*0.5,3)}%"></div><div style="flex:1"></div>`
          }</div><div class="chart-zero"></div><span class="chart-label ${cu?'current':''}">${SHORT[i]}</span><span class="chart-value ${cr?'credit':'owing'}">${fmt(b.running)}</span></div>`;
        }).join("");
      })()}</div>
    </div>
    <div class="section"><h2 class="section-title">Monthly Breakdown</h2>
      <div class="table-wrap"><table><thead><tr><th>Month</th><th>Full Bill</th><th>John's Half</th><th>Balance</th></tr></thead><tbody>
        ${bal.map((b,i) => {
          const cu = i===cm, fu = i>cm, cr = b.running<=0;
          return `<tr class="${cu?'current-row':''} ${fu?'future-row':''}">
            <td style="font-weight:${cu?600:400}">${cu?'<span class="current-dot">●</span>':''}${b.month}</td>
            <td>${fmt(b.fullBill)}</td><td>${fmt(b.halfBill)}</td>
            <td class="${cr?'balance-credit':'balance-owing'}">${fmt(b.running)}<span class="who-owes">${cr?'John has credit':'John owes Ira'}</span></td></tr>`;
        }).join("")}
      </tbody></table></div>
    </div>
  </div>`;
  bindNav();
}

function renderAddExpense() {
  const editing = editingId && data.expenses[editingId];
  const existing = editing ? data.expenses[editingId] : null;
  const isEdit = !!existing;
  const initWho = isEdit ? (existing.paidBy || "John") : "John";
  const initDesc = isEdit ? existing.description : "";
  const initAmt = isEdit ? existing.fullAmount : "";
  const initDate = isEdit ? existing.date : new Date().toISOString().slice(0,10);

  app.innerHTML = renderNav() + `<div class="form-section fade-in">
    <h2 class="section-title">${isEdit ? 'Edit Expense' : 'Add a Shared Expense'}</h2>
    <p class="form-hint">Enter the full amount paid — we'll split it in half automatically. For returns, enter a negative amount.</p>
    <label class="field-label">Who paid?</label>
    <div class="person-toggle">
      <button id="pick-john" class="${initWho==='John'?'selected':''}"><span class="avatar avatar-j">J</span> John</button>
      <button id="pick-ira" class="${initWho==='Ira'?'selected':''}"><span class="avatar avatar-i">I</span> Ira</button>
    </div>
    <div class="form-group"><label class="field-label">What was it for?</label>
      <input type="text" id="exp-desc" placeholder="e.g. Philippines flights, Mattress, Dinner..." value="${initDesc}"></div>
    <div class="form-row">
      <div class="form-group"><label class="field-label">Full Amount</label>
        <div class="input-wrap"><span class="input-prefix">$</span>
        <input type="number" id="exp-amount" step="0.01" placeholder="0.00" class="input-dollar" value="${initAmt}"></div></div>
      <div class="form-group"><label class="field-label">Date</label>
        <input type="date" id="exp-date" value="${initDate}"></div>
    </div>
    <div id="split-preview"></div>
    <div class="btn-row"><button class="btn-secondary" id="btn-cancel">Cancel</button>
      <button class="btn-primary" id="btn-add" disabled>${isEdit ? 'Save Changes' : 'Add Expense'}</button></div>
  </div>`;
  bindNav();

  let who = initWho;
  const desc = $("#exp-desc"), amt = $("#exp-amount"), btn = $("#btn-add"), prev = $("#split-preview");

  $("#btn-cancel").onclick = () => { editingId = null; currentView = isEdit ? "expenses" : "dashboard"; render(); };
  $("#pick-john").onclick = () => { who="John"; $("#pick-john").classList.add("selected"); $("#pick-ira").classList.remove("selected"); upd(); };
  $("#pick-ira").onclick = () => { who="Ira"; $("#pick-ira").classList.add("selected"); $("#pick-john").classList.remove("selected"); upd(); };

  function upd() {
    const v = parseFloat(amt.value), ok = desc.value.trim() && !isNaN(v) && v !== 0;
    btn.disabled = !ok;
    if (!isNaN(v) && v !== 0) {
      const ret = v < 0, half = Math.abs(v)/2;
      let effect = ret ? `Reduces ${who}'s credit by` : who === "John" ? "Ira's half — credit for John" : "John's half — he owes Ira";
      prev.innerHTML = `<div class="split-preview ${ret?'return':''}">
        <div class="split-row"><span>${ret?'Return':'Full amount'} <span style="color:var(--text-faint)">(${who})</span></span><span style="font-weight:600">${fmt(Math.abs(v))}</span></div>
        <div class="split-divider"></div>
        <div class="split-row"><span>${effect}</span><span style="font-weight:600;color:${ret?'var(--red)':'var(--green)'}">${fmt(half)}</span></div></div>`;
    } else prev.innerHTML = '';
  }
  desc.oninput = upd; amt.oninput = upd;
  upd(); // run once to enable button if editing

  btn.onclick = () => {
    const d = desc.value.trim(), f = parseFloat(amt.value), dt = $("#exp-date").value;
    if (!d || isNaN(f) || f === 0) return;
    const half = Math.round(f/2*100)/100;
    data.expenses = data.expenses || {};
    const id = isEdit ? editingId : Date.now().toString();
    data.expenses[id] = { description: d, halfAmount: half, fullAmount: f, paidBy: who, date: dt || new Date().toISOString().slice(0,10) };
    saveData();
    showToast(isEdit ? `Updated ${d}` : `Added ${d} — ${fmt(Math.abs(half))} (${who})`);
    editingId = null;
    currentView = isEdit ? "expenses" : "dashboard";
    render();
  };
}

function renderExpenses() {
  const exps = getExpensesList(), { johnCredits, iraCredits } = getNetCredits();
  const deleted = Object.entries(data.deletedExpenses || {}).map(([id, e]) => ({ id, ...e }));

  app.innerHTML = renderNav() + `<div class="fade-in"><h2 class="section-title">All Expenses</h2>
    ${exps.length === 0 ? '<p class="empty-text">No expenses yet.</p>' : `<div class="expense-list">
      ${exps.map(e => { const p = e.paidBy||'John', j = p==='John'; return `<div class="expense-item"><div class="expense-info">
        <span class="expense-name">${e.description}</span>
        <span class="expense-meta"><span class="person-badge"><span class="avatar-sm ${j?'avatar-j':'avatar-i'}">${j?'J':'I'}</span>${p}</span>
          &nbsp;·&nbsp; ${e.date||'—'} &nbsp;·&nbsp; Full: ${fmt(e.fullAmount||e.halfAmount*2)}</span></div>
        <div class="expense-right"><span class="expense-amount ${e.halfAmount<0?'debit':'credit'}">${e.halfAmount<0?'-':''}${fmt(Math.abs(e.halfAmount))}</span>
          <button class="edit-btn" data-edit="${e.id}" title="Edit">✎</button>
          <button class="remove-btn" data-remove="${e.id}" title="Delete">×</button></div></div>`; }).join("")}
      <div class="expense-total"><span>John's total credits</span><span style="font-weight:600;color:var(--green)">${fmt(johnCredits)}</span></div>
      <div class="expense-total"><span>Ira's total credits</span><span style="font-weight:600;color:var(--green)">${fmt(iraCredits)}</span></div>
    </div>`}
    ${deleted.length > 0 ? `
      <div class="deleted-section">
        <h3>Recently Deleted</h3>
        ${deleted.map(e => {
          const p = e.paidBy||'John';
          const daysAgo = Math.floor((Date.now() - (e.deletedAt||0)) / 86400000);
          const when = daysAgo === 0 ? 'Today' : daysAgo === 1 ? 'Yesterday' : daysAgo + ' days ago';
          return `<div class="deleted-item">
            <div class="deleted-info">
              <span class="deleted-name">${e.description}</span>
              <span class="deleted-meta">${p} · ${fmt(e.fullAmount||e.halfAmount*2)} · Deleted ${when}</span>
            </div>
            <button class="restore-btn" data-restore="${e.id}">Restore</button>
          </div>`;
        }).join("")}
      </div>` : ''}
  </div>`;
  bindNav();

  // Soft delete — move to deletedExpenses
  $$("[data-remove]").forEach(b => b.onclick = () => {
    const id = b.dataset.remove;
    const expense = JSON.parse(JSON.stringify(data.expenses[id]));
    expense.deletedAt = Date.now();
    data.deletedExpenses = data.deletedExpenses || {};
    data.deletedExpenses[id] = expense;
    delete data.expenses[id];
    saveData();
    showToast("Expense moved to Recently Deleted");
  });

  // Edit — navigate to add form with pre-filled data
  $$("[data-edit]").forEach(b => b.onclick = () => {
    editingId = b.dataset.edit;
    currentView = "add";
    render();
  });

  // Restore from deleted
  $$("[data-restore]").forEach(b => b.onclick = () => {
    const id = b.dataset.restore;
    const expense = JSON.parse(JSON.stringify(data.deletedExpenses[id]));
    delete expense.deletedAt;
    data.expenses[id] = expense;
    delete data.deletedExpenses[id];
    saveData();
    showToast("Expense restored");
  });
}

      </div>
      <div style="margin-top:24px"><label class="field-label">Property Tax by Month (Full Amount)</label>
        <div class="prop-tax-grid">${MONTHS.map((m,i) => `<div class="prop-tax-item"><span class="prop-tax-label">${SHORT[i]}</span>
          <div class="input-wrap"><span class="input-prefix">$</span>
          <input type="number" step="0.01" id="ptax-${i}" value="${b.propertyTax[i]||0}" class="input-dollar"></div></div>`).join("")}</div>
      </div>
      <div class="btn-row"><button class="btn-secondary" id="btn-cancel-edit">Cancel</button>
        <button class="btn-primary" id="btn-save-bills">Save Bills</button></div>
    </div>`;
    bindNav();
    $("#btn-cancel-edit").onclick = () => { billsEditing = false; render(); };
    $("#btn-save-bills").onclick = () => {
      data.bills = { mortgage: parseFloat($("#bill-mortgage").value)||0, condoFees: parseFloat($("#bill-condoFees").value)||0, parking: parseFloat($("#bill-parking").value)||0,
        propertyTax: MONTHS.map((_,i) => parseFloat($(`#ptax-${i}`).value)||0) };
      saveData(); showToast("Bills updated"); billsEditing = false; currentView = "dashboard"; render();
    };
  }
}

function bindNav() {
  $$("[data-view]").forEach(b => b.onclick = () => { currentView = b.dataset.view; render(); });
  $$("[data-yr]").forEach(b => b.onclick = () => {
    const yr = parseInt(b.dataset.yr);
    if (yr <= CURRENT_YEAR) switchYear(yr);
  });
}

initFirebase();

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
